<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Details</title>

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="~{fragments/layout :: menuButton}"></div>
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div th:replace="~{fragments/layout :: topbar(
    'IOC Details',
    'Indicator of Compromise Information'
)}"></div>

<main>

    <section class="alerts">

        <div class="alerts-header">
            <h2>Indicator Information</h2>
        </div>

        <div class="details-grid">

            <div class="detail-card">
                <h3>ID</h3>
                <p id="iocIdDisplay">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Value</h3>
                <p id="iocValue">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Type</h3>
                <p id="iocType">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Threat Level</h3>
                <p id="threatLevel">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Status</h3>
                <p id="iocStatus">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Source</h3>
                <p id="iocSource">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Description</h3>
                <p id="iocDescription">Loading...</p>
            </div>

        </div>

    </section>

</main>

<script th:inline="javascript">
    const iocId = [[${iocId}]];
</script>

<script src="/js/layout.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/ioc-details.js"></script>

</body>
</html>
