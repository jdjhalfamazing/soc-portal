<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details</title>

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="fragments/layout :: menuButton"></div>

<div th:replace="fragments/layout :: sidebar"></div>

<div th:replace="fragments/layout :: topbar(
    'Asset Details',
    'Enterprise Asset Information'
)"></div>

<main>

    <section class="alerts">

        <div class="alerts-header">
            <h2>Asset Information</h2>
        </div>

        <div class="details-grid">

            <div class="detail-card">
                <h3>Hostname</h3>
                <p id="hostname">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>IP Address</h3>
                <p id="ipAddress">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Operating System</h3>
                <p id="operatingSystem">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Owner</h3>
                <p id="owner">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Criticality</h3>
                <p id="criticality">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Status</h3>
                <p id="status">Loading...</p>
            </div>

        </div>

    </section>
<section class="alerts">

    <div class="alerts-header">
        <h2>Open Vulnerabilities</h2>
    </div>

    <table id="assetVulnerabilityTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>CVE</th>
                <th>Severity</th>
                <th>CVSS</th>
                <th>Status</th>
                <th>Assigned To</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>

</section>

<section class="alerts">

    <div class="alerts-header">
        <h2>Related Alerts</h2>
    </div>

    <table id="assetAlertsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Severity</th>
                <th>Title</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>

</section>

</main>

<script th:inline="javascript">
    const assetId = [[${assetId}]];
</script>

<script src="/js/theme.js"></script>
<script src="/js/asset-details.js"></script>

</body>
</html>
