<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Details</title>

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="~{fragments/layout :: menuButton}"></div>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div th:replace="~{fragments/layout :: topbar(
    'Alert Details',
    'Security Alert Information'
)}"></div>

<main>

<section class="alerts">

    <div class="alerts-header">
        <h2>Alert Information</h2>
    </div>

    <div class="details-grid">

        <div class="detail-card">
            <h3>ID</h3>
            <p id="alertId">Loading...</p>
        </div>

        <div class="detail-card">
            <h3>Severity</h3>
            <p id="severity">Loading...</p>
        </div>

        <div class="detail-card">
            <h3>Host</h3>
            <p id="host">Loading...</p>
        </div>

        <div class="detail-card">
            <h3>Title</h3>
            <p id="title">Loading...</p>
        </div>

        <div class="detail-card">
            <h3>Status</h3>
            <p id="status">Loading...</p>
        </div>

    </div>

</section>

</main>

<script th:inline="javascript">
    const alertId = [[${alertId}]];
</script>

<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/alert-details.js"></script>

</body>
</html>
