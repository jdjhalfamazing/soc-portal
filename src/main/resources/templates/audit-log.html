<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Audit Log</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="~{fragments/layout :: menuButton}"></div>
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div th:replace="~{fragments/layout :: topbar(
    'Audit Log',
    'Track user activity across the SOC Portal'
)}"></div>

<main>
    <section class="filters">
        <input type="text" id="searchInput" placeholder="Search audit logs...">

        <select id="actionFilter">
            <option value="">All Actions</option>
            <option value="Created/Updated">Created/Updated</option>
            <option value="Deleted">Deleted</option>
        </select>

        <select id="moduleFilter">
            <option value="">All Modules</option>
            <option value="Alert">Alert</option>
            <option value="Asset">Asset</option>
            <option value="Incident">Incident</option>
            <option value="Vulnerability">Vulnerability</option>
        </select>
    </section>

    <section class="alerts">
        <div class="alerts-header">
            <h2>System Activity</h2>
        </div>

        <table id="auditLogTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Module</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
</main>

<script src="/js/theme.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/audit-log.js"></script>

</body>
</html>
