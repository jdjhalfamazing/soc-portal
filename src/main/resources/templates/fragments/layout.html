<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<button id="menuButton" class="menu-button" th:fragment="menuButton">☰</button>

<nav id="sideMenu" class="side-menu" th:fragment="sidebar">
    <h2>SOC Portal</h2>

    <a href="/">Dashboard</a>
    <a href="/alerts">Alerts</a>
    <a href="/incidents">Incidents</a>

    <a href="/assets" sec:authorize="hasAnyRole('ISSO','ADMIN')">
        Assets
    </a>

    <a href="/vulnerabilities" sec:authorize="hasAnyRole('ISSO','ADMIN')">
        Vulnerabilities
    </a>

    <a href="#" sec:authorize="hasRole('ADMIN')">
        Users
    </a>

    <a href="/logout" class="logout-link">
    🚪 Logout
</a>
</nav>

<header class="topbar" th:fragment="topbar(pageTitle, pageSubtitle)">
    <div class="topbar-left">
        <h1 th:text="${pageTitle}">Page Title</h1>
        <p th:text="${pageSubtitle}">Page subtitle</p>
    </div>

    <div class="topbar-right">
        <span>🔔 Notifications</span>
        <span>👤 <span sec:authentication="name">User</span></span>
    </div>
</header>

</body>
</html>
