<!DOCTYPE html>
<html
    lang="en"
    xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<button id="menuButton" class="menu-button" th:fragment="menuButton">☰</button>

<nav id="sideMenu" class="side-menu" th:fragment="sidebar">
    <h2>SOC Portal</h2>

    <a href="/">Dashboard</a>
    <a href="/alerts">Alerts</a>
    <a href="/incidents">Incidents</a>
    <a href="/audit-log">Audit Log</a>

    <a href="/assets" sec:authorize="hasAnyRole('ISSO','ADMIN')">
        Assets
    </a>

    <a href="/vulnerabilities" sec:authorize="hasAnyRole('ISSO','ADMIN')">
        Vulnerabilities
    </a>

    <a href="/iocs" sec:authorize="hasAnyRole('ISSO','ADMIN')">
    Indicators of Compromise
</a>

  <a href="/users" sec:authorize="hasRole('ADMIN')">
    Users
</a>

    <a href="/logout" class="logout-link">
    🚪 Logout
</a>
</nav>

<header class="topbar" th:fragment="topbar(pageTitle, pageSubtitle)">
    <div class="topbar-left">
        <h1 th:text="${pageTitle}">Page Title</h1>
        <p th:text="${pageSubtitle}">Page subtitle</p>
    </div>

  <div class="topbar-right">
<div class="notification-menu">

    <button id="notificationButton" class="notification-button">
        🔔 Notifications
        <span id="notificationCount" class="notification-count">0</span>
    </button>

   <div id="notificationDropdown" class="notification-dropdown">

    <h3>Notifications</h3>

   <div id="notificationList" class="notification-list"></div>

    <button id="clearNotificationsButton" class="clear-notifications-button">
        Clear All
    </button>

</div>

</div>

<div class="user-menu">

    <button id="userMenuButton" class="user-menu-button">
        👤 <span sec:authentication="name">User</span> ▼
    </button>

    <div id="userDropdown" class="user-dropdown">

        <div class="user-dropdown-role">
            <span sec:authorize="hasRole('ANALYST')">SOC Analyst</span>
            <span sec:authorize="hasRole('ISSO')">ISSO</span>
            <span sec:authorize="hasRole('ADMIN')">Administrator</span>
        </div>

        <a href="/profile">Profile</a>
        <a href="/settings">Settings</a>
        <a href="/logout" class="logout-dropdown">Logout</a>

    </div>

</div>
</div>
</header>

</body>
</html>
