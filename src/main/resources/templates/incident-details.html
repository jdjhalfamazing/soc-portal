<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Details</title>

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="~{fragments/layout :: menuButton}"></div>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div th:replace="~{fragments/layout :: topbar(
    'Incident Details',
    'Security Incident Information'
)}"></div>

<main>

    <section class="alerts">

        <div class="alerts-header">
            <h2>Incident Information</h2>
        </div>

        <div class="details-grid">

            <div class="detail-card">
                <h3>ID</h3>
                <p id="incidentId">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Incident Number</h3>
                <p id="incidentNumber">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Title</h3>
                <p id="incidentTitle">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Priority</h3>
                <p id="incidentPriority">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Status</h3>
                <p id="incidentStatus">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Assigned To</h3>
                <p id="assignedTo">Loading...</p>
            </div>

            <div class="detail-card">
                <h3>Description</h3>
                <p id="incidentDescription">Loading...</p>
            </div>

        </div>

    </section>

</main>

<script th:inline="javascript">
    const incidentId = [[${incidentId}]];
</script>

<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/incident-details.js"></script>

</body>
</html>
