<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Portal Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="fragments/layout :: menuButton"></div>

<div th:replace="fragments/layout :: sidebar"></div>

<div th:replace="fragments/layout :: topbar(
    'Alert Management',
    'Triage, update, and manage SOC alerts'
)"></div>

<main>

    <section class="summary">
        <div class="card critical"><h2 id="criticalCount">0</h2><p>Critical</p></div>
        <div class="card high"><h2 id="highCount">0</h2><p>High</p></div>
        <div class="card medium"><h2 id="mediumCount">0</h2><p>Medium</p></div>
        <div class="card low"><h2 id="lowCount">0</h2><p>Low</p></div>

        <div class="card total"><h2 id="totalCount">0</h2><p>Total Alerts</p></div>
        <div class="card open"><h2 id="openCount">0</h2><p>Open</p></div>
        <div class="card investigating"><h2 id="investigatingCount">0</h2><p>Investigating</p></div>
        <div class="card closed"><h2 id="closedCount">0</h2><p>Closed</p></div>
    </section>

    <section class="alerts">

        <div class="alerts-header">
            <h2>Alert Management</h2>

            <button id="newAlertButton" class="new-alert-button">
                + New Alert
            </button>
        </div>

        <div class="filters">
            <input
                type="text"
                id="searchInput"
                placeholder="Search alerts...">

            <select id="severityFilter">
                <option value="">All Severities</option>
                <option>Critical</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

            <select id="statusFilter">
                <option value="">All Statuses</option>
                <option>Open</option>
                <option>Investigating</option>
                <option>Closed</option>
            </select>
        </div>

        <table id="alertsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Severity</th>
                    <th>Host</th>
                        <th>Indicator</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>

    </section>

</main>

<div id="alertModal" class="modal">
    <div class="modal-content">

        <h2>Create Alert</h2>

        <select id="newSeverity">
            <option>Critical</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <input type="text" id="newHost" placeholder="Host">

        <input
    type="text"
    id="newIndicator"
    placeholder="Indicator (IP, Domain, Hash, URL...)">

        <input type="text" id="newTitle" placeholder="Alert Title">

        <select id="newStatus">
            <option>Open</option>
            <option>Investigating</option>
            <option>Closed</option>
        </select>

        <div class="modal-buttons">
            <button id="saveAlertButton">Save Alert</button>
            <button id="cancelButton">Cancel</button>
        </div>

    </div>
</div>
<script src="/js/theme.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/alerts.js"></script>

</body>
</html>
