<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulnerability Management</title>

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div th:replace="fragments/layout :: menuButton"></div>

<div th:replace="fragments/layout :: sidebar"></div>

<div th:replace="fragments/layout :: topbar(
    'Vulnerability Management',
    'Track and remediate enterprise vulnerabilities'
)"></div>

<main>

<section class="alerts">

    <div class="alerts-header">
        <h2>Vulnerabilities</h2>

        <button id="newVulnerabilityButton" class="new-alert-button">
            + New Vulnerability
        </button>
    </div>

    <div class="filters">

        <input
            type="text"
            id="searchInput"
            placeholder="Search vulnerabilities...">

        <select id="severityFilter">
            <option value="">All Severities</option>
            <option>Critical</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <select id="statusFilter">
            <option value="">All Statuses</option>
            <option>Open</option>
            <option>In Progress</option>
            <option>Remediated</option>
        </select>

    </div>

    <table id="vulnerabilityTable">

        <thead>

        <tr>
            <th>ID</th>
            <th>CVE</th>
            <th>Hostname</th>
            <th>Severity</th>
            <th>CVSS</th>
            <th>Status</th>
            <th>Assigned To</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody></tbody>

    </table>

</section>

</main>
<div id="vulnerabilityModal" class="modal">
    <div class="modal-content">

        <h2>Create Vulnerability</h2>

        <input type="text" id="newCve" placeholder="CVE">
        <input type="text" id="newHostname" placeholder="Hostname">

        <select id="newSeverity">
            <option>Critical</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <input type="number" step="0.1" id="newCvssScore" placeholder="CVSS Score">

        <select id="newStatus">
            <option>Open</option>
            <option>In Progress</option>
            <option>Remediated</option>
        </select>

        <input type="text" id="newAssignedTo" placeholder="Assigned To">

        <div class="modal-buttons">
            <button id="saveVulnerabilityButton">Save Vulnerability</button>
            <button id="cancelVulnerabilityButton">Cancel</button>
        </div>

    </div>
</div>

<script src="/js/notifications.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/vulnerabilities.js"></script>

</body>

</html>
